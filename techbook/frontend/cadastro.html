<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechBook | Cadastro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/index.css">
</head>
<body data-page="signup">
  <main class="auth-shell">
    <a class="brand auth-brand" href="index.html"><span class="brand-mark">📘</span><span>TECHBOOK</span></a>
    <form id="signupForm" class="auth-card signup-card">
      <h1>Cadastramento</h1>
      <p>Os dados enviados aqui são gravados na API e já liberam o acesso à área do cliente.</p>
      <div class="split-fields">
        <input type="text" id="signupName" placeholder="Nome completo" required>
        <input type="text" id="signupCpf" placeholder="CPF" required>
        <input type="email" id="signupEmail" placeholder="E-mail" required>
        <input type="email" id="signupEmailConfirm" placeholder="Confirmar e-mail" required>
        <input type="text" id="signupPhone" placeholder="DDD e número de telefone" required>
        <input type="password" id="signupPassword" placeholder="Senha" required>
      </div>
      <button class="button primary" type="submit">Cadastrar</button>
      <p class="feedback" id="signupFeedback"></p>
    </form>
  </main>
  <script src="js/app.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
