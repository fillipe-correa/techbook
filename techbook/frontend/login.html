<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechBook | Entrar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/index.css">
</head>
<body data-page="login">
  <main class="auth-shell">
    <a class="brand auth-brand" href="index.html"><span class="brand-mark">📘</span><span>TECHBOOK</span></a>
    <section class="auth-grid">
      <form id="loginForm" class="auth-card">
        <h1>Já sou cliente</h1>
        <input type="email" id="loginEmail" placeholder="E-mail" required>
        <input type="password" id="loginPassword" placeholder="Senha" required>
        <button class="button primary" type="submit">Acessar conta</button>
        <p class="feedback" id="loginFeedback"></p>
      </form>
      <div class="auth-card">
        <h1>Criar conta</h1>
        <p>Cadastre um leitor para começar a reservar livros no catálogo.</p>
        <a class="button secondary" href="cadastro.html">Prosseguir</a>
      </div>
    </section>
  </main>
  <script src="js/app.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
